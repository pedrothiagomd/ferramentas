<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden}

/* LOGIN */
#login{position:fixed;inset:0;background:#111;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login.off{display:none}
#login h1{font-size:1.6rem;font-weight:700;margin-bottom:4px}
#login p{color:#888;font-size:.85rem;margin-bottom:28px}
.u-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.u-item{display:flex;align-items:center;gap:12px;padding:12px;background:#1e1e1e;border:2px solid #333;border-radius:12px;cursor:pointer;width:100%}
.u-item.sel{border-color:#4f8ef7;background:#4f8ef720}
.u-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.u-info .name{font-size:.9rem;font-weight:600;color:#fff;text-align:left}
.u-info .role{font-size:.72rem;color:#888;text-align:left}
.pw-wrap{width:100%;max-width:340px;position:relative;margin-bottom:10px}
.pw-wrap input{width:100%;padding:13px 42px 13px 14px;background:#1e1e1e;border:2px solid #333;border-radius:10px;color:#fff;font-size:.95rem;outline:none;-webkit-appearance:none}
.pw-wrap input:focus{border-color:#4f8ef7}
.pw-wrap button{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:1rem;cursor:pointer}
#login-err{color:#f43f5e;font-size:.82rem;min-height:18px;margin-bottom:8px;width:100%;max-width:340px;text-align:center}
.l-btn{width:100%;max-width:340px;padding:14px;background:#4f8ef7;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
#app.on{display:flex}
.topbar{height:52px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
.topbar .t-title{font-size:1rem;font-weight:700}
.topbar .t-right{display:flex;align-items:center;gap:8px}
.mpill{background:#1e1e1e;border:1px solid #333;border-radius:99px;padding:5px 10px;font-size:.78rem;color:#aaa;cursor:pointer}
.cfg{background:none;border:none;color:#aaa;font-size:1rem;cursor:pointer;padding:2px}
.ro-bar{background:#f59e0b20;border-bottom:1px solid #f59e0b;padding:5px;font-size:.72rem;color:#f59e0b;text-align:center;flex-shrink:0;display:none}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}
.bnav{height:60px;background:#1a1a1a;border-top:1px solid #222;display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#555;cursor:pointer;font-size:.6rem;font-weight:600;position:relative}
.nb.on{color:#4f8ef7}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nbadge{position:absolute;top:4px;right:calc(50% - 18px);background:#f43f5e;color:#fff;font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:99px;display:none}

/* PAGES */
.page{display:none}.page.on{display:block}
.slabel{font-size:.68rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px}
.card.full{grid-column:1/-1}
.card.green{border-color:#22c55e;background:#22c55e12}
.card.red{border-color:#f43f5e;background:#f43f5e12}
.card.orange{border-color:#f59e0b;background:#f59e0b12}
.card.blue{border-color:#4f8ef7;background:#4f8ef712}
.card .cl{font-size:.7rem;color:#777;margin-bottom:4px}
.card .cv{font-size:1.1rem;font-weight:700}
.cv.g{color:#22c55e}.cv.r{color:#f43f5e}.cv.o{color:#f59e0b}.cv.b{color:#4f8ef7}

.lcard{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;margin-bottom:10px}
.li{display:flex;align-items:center;gap:10px;padding:12px 13px;border-bottom:1px solid #222}
.li:last-child{border-bottom:none}
.li-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.li-b{flex:1;min-width:0}
.li-t{font-size:.87rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-s{font-size:.72rem;color:#666;margin-top:2px}
.li-r{text-align:right;flex-shrink:0}
.li-v{font-size:.9rem;font-weight:700}
.li-m{font-size:.7rem;color:#666;margin-top:2px}
.prog{height:3px;background:#2a2a2a;border-radius:99px;margin-top:5px;overflow:hidden}
.prog-f{height:100%;border-radius:99px}

.badge{display:inline-flex;padding:3px 8px;border-radius:99px;font-size:.68rem;font-weight:700;cursor:pointer}
.badge.pendente{background:#f59e0b20;color:#f59e0b}
.badge.pago{background:#22c55e20;color:#22c55e}
.badge.vencido{background:#f43f5e20;color:#f43f5e}
.badge.cancelado{background:#33333a;color:#666}

/* RECEBIMENTOS */
.ri{display:flex;align-items:center;gap:10px;padding:12px 13px;border-bottom:1px solid #222}
.ri:last-child{border-bottom:none}
.ri-label{flex:1;font-size:.87rem;font-weight:600}
.ri-val{display:flex;align-items:center;gap:4px}
.ri-val span{font-size:.78rem;color:#666}
.ri-val input{width:110px;background:#222;border:1.5px solid #333;border-radius:8px;padding:7px 9px;color:#fff;font-size:.87rem;font-weight:600;outline:none;text-align:right;-webkit-appearance:none}
.ri-val input:focus{border-color:#4f8ef7}
.save-btn{width:100%;padding:14px;background:#4f8ef7;color:#fff;border:none;border-radius:12px;font-size:.93rem;font-weight:700;cursor:pointer;margin-top:14px}

/* FAB */
.fab{position:fixed;bottom:72px;right:16px;width:50px;height:50px;border-radius:50%;background:#4f8ef7;color:#fff;border:none;font-size:1.6rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px #4f8ef760;z-index:50}
.fab.off{display:none}

/* FUNC CARD */
.fc{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px;margin-bottom:10px}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fc-av{width:40px;height:40px;border-radius:50%;background:#4f8ef720;color:#4f8ef7;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.fc-name{font-weight:700;font-size:.9rem}
.fc-cargo{font-size:.72rem;color:#666;margin-top:1px}
.fc-rows{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.75rem;color:#777}
.fc-rows span{font-weight:600;color:#ddd}
.fc-bot{margin-top:10px;padding-top:10px;border-top:1px solid #222;display:flex;align-items:center;justify-content:space-between}
.fc-total{font-size:.98rem;font-weight:700;color:#2dd4bf}
.del-btn{background:#f43f5e20;color:#f43f5e;border:none;border-radius:8px;padding:6px 12px;font-size:.75rem;font-weight:600;cursor:pointer}
.empty-s{text-align:center;padding:32px 20px;color:#444;font-size:.85rem}

/* SHEET */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.sov.on{display:flex}
.sheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:16px 16px 40px;width:100%;max-height:90vh;overflow-y:auto}
.sh{width:36px;height:4px;background:#333;border-radius:99px;margin:0 auto 14px}
.stitle{font-size:1rem;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.7rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fg input,.fg select{width:100%;background:#222;border:1.5px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:.9rem;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:#4f8ef7}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sactions{display:flex;gap:10px;margin-top:6px}
.sactions button{flex:1;padding:13px;border-radius:10px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
.s-cancel{background:#222;color:#aaa}
.s-ok{background:#4f8ef7;color:#fff}

/* MONTH DRAWER */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end}
.mov.on{display:flex}
.mdrawer{background:#1a1a1a;border-radius:20px 20px 0 0;padding:16px 16px 40px;width:100%}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.mbtn{background:#222;border:1px solid #333;border-radius:8px;padding:10px 4px;text-align:center;font-size:.85rem;font-weight:500;color:#aaa;cursor:pointer}
.mbtn.on{background:#4f8ef720;border-color:#4f8ef7;color:#4f8ef7}

/* SETTINGS */
.seti{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #222}
.seti:last-child{border-bottom:none}
.seti .sl2{font-size:.9rem;font-weight:500}
.seti .ss{font-size:.72rem;color:#666;margin-top:2px}
.seti-r{display:flex;gap:6px;align-items:center}
.seti-r input{width:120px;background:#222;border:1.5px solid #333;border-radius:8px;padding:7px 10px;color:#fff;font-size:.82rem;outline:none;-webkit-appearance:none}
.seti-r input:focus{border-color:#4f8ef7}
.seti-r button{background:#4f8ef7;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:.8rem;font-weight:600;cursor:pointer}
.logout-btn{background:#f43f5e20;color:#f43f5e;border:1px solid #f43f5e;border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:600;cursor:pointer}

/* TOAST */
.tw{position:fixed;top:60px;left:14px;right:14px;z-index:999;pointer-events:none}
.toast{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 13px;font-size:.83rem;font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:5px;box-shadow:0 4px 16px #0008;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-left:3px solid #22c55e}
.toast.err{border-left:3px solid #f43f5e}
.toast.inf{border-left:3px solid #4f8ef7}
</style>

</head>

async function dbSet(key, val) {
  cache[key] = val;
  try { await db.collection('data').doc(key).set({v: JSON.stringify(val)}); }
  catch(e) { localStorage.setItem(key, JSON.stringify(val)); }
}
async function dbGet(key) {
  if (cache[key] !== undefined) return cache[key];
  try {
    const s = await db.collection('data').doc(key).get();
    const val = s.exists ? JSON.parse(s.data().v) : null;
    cache[key] = val;
    return val;
  } catch(e) {
    try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
  }
}
const mk = (t,m) => m!==undefined ? `bf26_${t}_m${m}` : `bf26_${t}`;
const getRec  = m => dbGet(mk('rec',m)).then(v=>v||{});
const getBols = m => dbGet(mk('bol',m)).then(v=>v||[]);
const getFix  = ()=> dbGet(mk('fix')).then(v=>v||[]);
const getFns  = ()=> dbGet(mk('fns')).then(v=>v||[]);
const getCfSt = m => dbGet(mk('cfst',m)).then(v=>v||{});
const getFnSt = m => dbGet(mk('fnst',m)).then(v=>v||{});

async function preload(m) {
  await Promise.all([
    dbGet(mk('rec',m)), dbGet(mk('bol',m)),
    dbGet(mk('fix')),   dbGet(mk('fns')),
    dbGet(mk('cfst',m)),dbGet(mk('fnst',m))
  ]);
}

// ── UTILS ────────────────────────────────────────────────
const brl = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fd  = d => { if(!d)return'—'; const p=d.split('-'); return`${p[2]}/${p[1]}`; };
const uid = () => Math.random().toString(36).slice(2,9);

function toast(msg, type='ok') {
  const w = document.getElementById('tw');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type==='ok'?'✓ ':type==='err'?'✕ ':'• ') + msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function nextSt(s) {
  const c = ['PENDENTE','PAGO','VENCIDO','CANCELADO'];
  return c[(c.indexOf(s||'PENDENTE')+1)%c.length];
}
function badge(s, oc) {
  const cls = (s||'PENDENTE').toLowerCase();
  return `<span class="badge ${cls}" onclick="${oc}">${s||'PENDENTE'}</span>`;
}

// ── AUTH ─────────────────────────────────────────────────
async function sha(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(uid, pw) {
  const stored = localStorage.getItem('pw_'+uid);
  const hash = await sha(pw);
  if (stored) return stored === hash;
  const def = {admin:'admin123',u1:'1234',u2:'1234',u3:'1234'};
  return hash === await sha(def[uid]||'');
}
async function setPw(uid, pw) {
  localStorage.setItem('pw_'+uid, await sha(pw));
}

function renderUsers() {
  document.getElementById('user-btns').innerHTML = USERS.map(u =>
    `<button class="u-item${u.id===selUid?' sel':''}" onclick="selUser('${u.id}')">
      <div class="u-av" style="background:${u.color}25;color:${u.color}">${u.av}</div>
      <div class="u-info"><div class="name">${u.name}</div><div class="role">${u.role==='admin'?'Administrador':'Visualizador'}</div></div>
    </button>`).join('');
}

function selUser(id) {
  selUid = id;
  renderUsers();
  document.getElementById('pw-inp').focus();
  document.getElementById('login-err').textContent = '';
}

function togglePw() {
  const inp = document.getElementById('pw-inp');
  inp.type = inp.type==='password'?'text':'password';
}

async function doLogin() {
  const pw = document.getElementById('pw-inp').value;
  const err = document.getElementById('login-err');
  if (!pw) { err.textContent='Digite a senha'; return; }
  const ok = await checkPw(selUid, pw);
  if (!ok) { err.textContent='Senha incorreta'; document.getElementById('pw-inp').value=''; return; }
  curUser = USERS.find(u=>u.id===selUid);
  document.getElementById('login').classList.add('off');
  document.getElementById('app').classList.add('on');
  document.getElementById('pw-inp').value='';
  err.textContent='';
  applyRole();
  renderMG();
  await preload(curM);
  await renderPage('resumo');
  updateBadge();
}

function applyRole() {
  const adm = curUser.role==='admin';
  document.getElementById('ro-bar').style.display = adm?'none':'block';
}
function isAdmin() { return curUser?.role==='admin'; }
function guard() { if(!isAdmin()){toast('Apenas o admin pode editar','err');return false;} return true; }

// ── NAV ──────────────────────────────────────────────────
const PAGE_TITLES = {resumo:'Resumo',rec:'Recebimentos',bol:'Boletos',fix:'Custos Fixos',eq:'Equipe'};
const FAB_PAGES = ['bol','fix','eq'];

async function go(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  document.getElementById('nb-'+id).classList.add('on');
  document.getElementById('ttitle').textContent = PAGE_TITLES[id];
  document.getElementById('fab').className = FAB_PAGES.includes(id)&&isAdmin()?'fab':'fab off';
  document.getElementById('scroll').scrollTo(0,0);
  await renderPage(id);
}

async function renderPage(id) {
  if(id==='resumo') await rResumo();
  if(id==='rec')    await rRec();
  if(id==='bol')    await rBol();
  if(id==='fix')    await rFix();
  if(id==='eq')     await rEq();
  updateBadge();
}

function openAdd() {
  const p = document.querySelector('.nb.on')?.id?.replace('nb-','');
  if(p==='bol') openSheet('s-bol');
  if(p==='fix') openSheet('s-fix');
  if(p==='eq')  openSheet('s-fn');
}
function openSheet(id) { document.getElementById(id).classList.add('on'); }
function closeSheet(id){ document.getElementById(id).classList.remove('on'); }
async function updateBadge() {
  const n = (await getBols(curM)).filter(b=>b.s==='PENDENTE'||b.s==='VENCIDO').length;
  const el = document.getElementById('bpend');
  el.textContent=n; el.style.display=n?'':'none';
}

// ── MONTH ────────────────────────────────────────────────
function renderMG() {
  document.getElementById('mgrid').innerHTML = MESES.map((m,i)=>
    `<div class="mbtn${i===curM?' on':''}" onclick="setM(${i})">${m.slice(0,3)}</div>`).join('');
  document.getElementById('mlabel').textContent = MESES[curM]+' 2026';
  const rl = document.getElementById('rec-mes-label');
  if(rl) rl.textContent = MESES[curM];
}
function openMov() { document.getElementById('mov').classList.add('on'); }
function closeMov(){ document.getElementById('mov').classList.remove('on'); }
async function setM(i) { curM=i; closeMov(); renderMG(); await preload(i); await renderPage(document.querySelector('.nb.on')?.id?.replace('nb-','')||'resumo'); }

// ── RESUMO ───────────────────────────────────────────────
async function rResumo() {
  const [rec,bols,fix,fns] = await Promise.all([getRec(curM),getBols(curM),getFix(),getFns()]);
  const tRec = FORMAS.reduce((s,f)=>s+(parseFloat(rec[f.k])||0),0);
  const bPago= bols.filter(b=>b.s==='PAGO').reduce((s,b)=>s+b.v,0);
  const bPend= bols.filter(b=>b.s==='PENDENTE').reduce((s,b)=>s+b.v,0);
  const tFix = fix.reduce((s,f)=>s+f.v,0);
  const tFn  = fns.reduce((s,f)=>s+f.sal*1.19+(f.vt||0)+(f.vr||0),0);
  const saldo= tRec-bPago-tFix-tFn;

  document.getElementById('d-cards').innerHTML=`
    <div class="card green"><div class="cl">💰 Recebido</div><div class="cv g">${brl(tRec)}</div></div>
    <div class="card ${saldo>=0?'blue':'red'}"><div class="cl">📊 Saldo</div><div class="cv ${saldo>=0?'b':'r'}">${brl(saldo)}</div></div>
    <div class="card orange full"><div class="cl">⏳ Boletos Pendentes</div><div class="cv o">${brl(bPend)}</div></div>`;

  document.getElementById('d-rec').innerHTML = FORMAS.map(f=>{
    const v = parseFloat(rec[f.k])||0;
    const pct = tRec>0?(v/tRec*100).toFixed(0):0;
    return`<div class="li">
      <div class="li-dot" style="background:${f.c}"></div>
      <div class="li-b"><div class="li-t">${f.l}</div>
        <div class="prog"><div class="prog-f" style="width:${pct}%;background:${f.c}"></div></div></div>
      <div class="li-r"><div class="li-v">${brl(v)}</div><div class="li-m">${pct}%</div></div>
    </div>`;}).join('');

  const rec5 = bols.slice(-4).reverse();
  document.getElementById('d-bol').innerHTML = rec5.length
    ? rec5.map(b=>`<div class="li">
        <div class="li-b"><div class="li-t">${b.d}</div><div class="li-s">${b.cat} · ${fd(b.venc)}</div>
          <div style="margin-top:5px">${badge(b.s,`tBol(${bols.indexOf(b)})`)}</div></div>
        <div class="li-r"><div class="li-v">${brl(b.v)}</div></div></div>`).join('')
    : '<div class="empty-s">Nenhum boleto lançado</div>';
}

// ── RECEBIMENTOS ─────────────────────────────────────────
async function rRec() {
  const rec = await getRec(curM);
  document.getElementById('rec-mes-label').textContent = MESES[curM];
  document.getElementById('r-list').innerHTML = FORMAS.map(f=>`
    <div class="ri">
      <div class="li-dot" style="background:${f.c}"></div>
      <div class="ri-label">${f.l}</div>
      <div class="ri-val"><span>R$</span>
        <input id="ri-${f.k}" type="number" inputmode="decimal" placeholder="0,00" value="${rec[f.k]||''}"/>
      </div>
    </div>`).join('');
}
async function saveRec() {
  if(!guard())return;
  const d={};
  FORMAS.forEach(f=>{d[f.k]=parseFloat(document.getElementById('ri-'+f.k)?.value)||0;});
  await dbSet(mk('rec',curM),d);
  toast('Recebimentos salvos!');
}

// ── BOLETOS ──────────────────────────────────────────────
async function addBol() {
  if(!guard())return;
  const d=document.getElementById('b-desc').value.trim();
  const venc=document.getElementById('b-venc').value;
  const v=parseFloat(document.getElementById('b-val').value)||0;
  const cat=document.getElementById('b-cat').value;
  const forma=document.getElementById('b-forma').value;
  if(!d||!v){toast('Preencha descrição e valor','err');return;}
  const bols=await getBols(curM);
  bols.push({id:uid(),d,venc,v,cat,forma,s:'PENDENTE'});
  await dbSet(mk('bol',curM),bols);
  closeSheet('s-bol');
  ['b-desc','b-venc','b-val'].forEach(i=>document.getElementById(i).value='');
  toast('Boleto adicionado!');
  await rBol(); updateBadge();
}
async function tBol(i) {
  if(!guard())return;
  const bols=await getBols(curM); if(!bols[i])return;
  bols[i].s=nextSt(bols[i].s);
  await dbSet(mk('bol',curM),bols);
  if(bols[i].s==='PAGO') toast(`"${bols[i].d}" pago!`);
  await rBol(); await rResumo(); updateBadge();
}
async function dBol(i) {
  if(!guard())return;
  const bols=await getBols(curM);
  if(!confirm(`Remover "${bols[i]?.d}"?`))return;
  bols.splice(i,1); await dbSet(mk('bol',curM),bols);
  toast('Removido','inf'); await rBol(); updateBadge();
}
async function rBol() {
  const bols=await getBols(curM);
  const pg=bols.filter(b=>b.s==='PAGO').reduce((s,b)=>s+b.v,0);
  const pd=bols.filter(b=>b.s==='PENDENTE').reduce((s,b)=>s+b.v,0);
  const vc=bols.filter(b=>b.s==='VENCIDO').reduce((s,b)=>s+b.v,0);
  document.getElementById('b-cards').innerHTML=`
    <div class="card green"><div class="cl">✅ Pagos</div><div class="cv g">${brl(pg)}</div></div>
    <div class="card orange"><div class="cl">⏳ Pendentes</div><div class="cv o">${brl(pd)}</div></div>
    <div class="card red full"><div class="cl">❌ Vencidos</div><div class="cv r">${brl(vc)}</div></div>`;
  document.getElementById('b-list').innerHTML = bols.length
    ? `<div class="lcard">${bols.map((b,i)=>`<div class="li">
        <div class="li-b"><div class="li-t">${b.d}</div><div class="li-s">${b.cat} · ${b.forma} · ${fd(b.venc)}</div>
          <div style="margin-top:5px">${badge(b.s,`tBol(${i})`)}</div></div>
        <div class="li-r" style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <div class="li-v">${brl(b.v)}</div>
          <button class="del-btn" onclick="dBol(${i})">🗑</button>
        </div></div>`).join('')}</div>`
    : '<div class="empty-s">Nenhum boleto — toque em + para adicionar</div>';
}

// ── CUSTOS FIXOS ─────────────────────────────────────────
async function addFix() {
  if(!guard())return;
  const d=document.getElementById('f-desc').value.trim();
  const v=parseFloat(document.getElementById('f-val').value)||0;
  const dia=document.getElementById('f-dia').value||'—';
  const forma=document.getElementById('f-forma').value;
  if(!d||!v){toast('Preencha descrição e valor','err');return;}
  const fix=await getFix();
  fix.push({id:uid(),d,v,dia,forma});
  await dbSet(mk('fix'),fix);
  closeSheet('s-fix');
  ['f-desc','f-val','f-dia'].forEach(i=>document.getElementById(i).value='');
  toast('Custo adicionado!'); await rFix();
}
async function tFix(i) {
  if(!guard())return;
  const m=curM, st=await getCfSt(m), fix=await getFix();
  const id=fix[i]?.id; if(!id)return;
  st[id]=nextSt(st[id]||'PENDENTE');
  await dbSet(mk('cfst',m),st);
  if(st[id]==='PAGO') toast(`"${fix[i].d}" pago!`);
  await rFix();
}
async function dFix(i) {
  if(!guard())return;
  const fix=await getFix();
  if(!confirm(`Remover "${fix[i]?.d}"?`))return;
  fix.splice(i,1); await dbSet(mk('fix'),fix);
  toast('Removido','inf'); await rFix();
}
async function rFix() {
  const fix=await getFix(), st=await getCfSt(curM);
  const total=fix.reduce((s,f)=>s+f.v,0);
  const pg=fix.filter(f=>st[f.id]==='PAGO').reduce((s,f)=>s+f.v,0);
  document.getElementById('f-cards').innerHTML=`
    <div class="card full"><div class="cl">Total Mensal</div><div class="cv">${brl(total)}</div></div>
    <div class="card green"><div class="cl">✅ Pagos</div><div class="cv g">${brl(pg)}</div></div>
    <div class="card orange"><div class="cl">⏳ Em aberto</div><div class="cv o">${brl(total-pg)}</div></div>`;
  document.getElementById('f-list').innerHTML = fix.length
    ? `<div class="lcard">${fix.map((f,i)=>`<div class="li">
        <div class="li-b"><div class="li-t">${f.d}</div><div class="li-s">${f.forma} · Dia ${f.dia}</div>
          <div style="margin-top:5px">${badge(st[f.id]||'PENDENTE',`tFix(${i})`)}</div></div>
        <div class="li-r" style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <div class="li-v">${brl(f.v)}</div>
          <button class="del-btn" onclick="dFix(${i})">🗑</button>
        </div></div>`).join('')}</div>`
    : '<div class="empty-s">Nenhum custo fixo — toque em + para adicionar</div>';
}

// ── EQUIPE ───────────────────────────────────────────────
async function addFn() {
  if(!guard())return;
  const nome=document.getElementById('fn-nome').value.trim();
  const cargo=document.getElementById('fn-cargo').value.trim();
  const sal=parseFloat(document.getElementById('fn-sal').value)||0;
  const vt=parseFloat(document.getElementById('fn-vt').value)||0;
  const vr=parseFloat(document.getElementById('fn-vr').value)||0;
  if(!nome||!sal){toast('Preencha nome e salário','err');return;}
  const fns=await getFns();
  fns.push({id:uid(),nome,cargo,sal,vt,vr});
  await dbSet(mk('fns'),fns);
  closeSheet('s-fn');
  ['fn-nome','fn-cargo','fn-sal','fn-vt','fn-vr'].forEach(i=>document.getElementById(i).value='');
  toast('Funcionário adicionado!'); await rEq();
}
async function tFn(i) {
  if(!guard())return;
  const m=curM, st=await getFnSt(m), fns=await getFns();
  const id=fns[i]?.id; if(!id)return;
  st[id]=nextSt(st[id]||'PENDENTE');
  await dbSet(mk('fnst',m),st);
  if(st[id]==='PAGO') toast(`Salário de "${fns[i].nome}" pago!`);
  await rEq();
}
async function dFn(i) {
  if(!guard())return;
  const fns=await getFns();
  if(!confirm(`Remover "${fns[i]?.nome}"?`))return;
  fns.splice(i,1); await dbSet(mk('fns'),fns);
  toast('Removido','inf'); await rEq();
}
async function rEq() {
  const fns=await getFns(), st=await getFnSt(curM);
  const tSal=fns.reduce((s,f)=>s+f.sal,0);
  const tCusto=fns.reduce((s,f)=>s+f.sal*1.19+(f.vt||0)+(f.vr||0),0);
  document.getElementById('e-cards').innerHTML=`
    <div class="card"><div class="cl">👥 Funcionários</div><div class="cv">${fns.length}</div></div>
    <div class="card"><div class="cl">💼 Total Salários</div><div class="cv">${brl(tSal)}</div></div>
    <div class="card blue full"><div class="cl">💰 Custo Total (c/ encargos)</div><div class="cv b">${brl(tCusto)}</div></div>`;
  const wrap=document.getElementById('e-list');
  if(!fns.length){wrap.innerHTML='<div class="empty-s">Nenhum funcionário — toque em + para adicionar</div>';return;}
  wrap.innerHTML=fns.map((f,i)=>{
    const inss=f.sal*.11, fgts=f.sal*.08, custo=f.sal+inss+fgts+(f.vt||0)+(f.vr||0);
    const av=f.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const s=st[f.id]||'PENDENTE';
    return`<div class="fc">
      <div class="fc-top">
        <div class="fc-av">${av}</div>
        <div style="flex:1;min-width:0"><div class="fc-name">${f.nome}</div><div class="fc-cargo">${f.cargo||'—'}</div></div>
        ${badge(s,`tFn(${i})`)}
      </div>
      <div class="fc-rows">
        <div>Salário<br><span>${brl(f.sal)}</span></div>
        <div>INSS 11%<br><span>${brl(inss)}</span></div>
        <div>FGTS 8%<br><span>${brl(fgts)}</span></div>
        <div>V. Transp.<br><span>${brl(f.vt)}</span></div>
        <div>V. Refeição<br><span>${brl(f.vr)}</span></div>
      </div>
      <div class="fc-bot">
        <div><div style="font-size:.72rem;color:#666">Custo Total</div><div class="fc-total">${brl(custo)}</div></div>
        <button class="del-btn" onclick="dFn(${i})">Remover</button>
      </div>
    </div>`;}).join('');
}

// ── SETTINGS ─────────────────────────────────────────────
function openSheet(id) {
  if(id==='s-cfg') renderCfg();
  document.getElementById(id).classList.add('on');
}
function renderCfg() {
  document.getElementById('cfg-content').innerHTML=`
    <div class="seti">
      <div><div class="sl2">Usuário</div><div class="ss">${curUser.name} · ${curUser.role==='admin'?'Admin':'Visualizador'}</div></div>
    </div>
    ${isAdmin()?`<div class="slabel">Alterar Senhas</div>
    ${USERS.map(u=>`<div class="seti">
      <div><div class="sl2">${u.name}</div></div>
      <div class="seti-r">
        <input id="npw-${u.id}" type="password" placeholder="Nova senha"/>
        <button onclick="changePw('${u.id}')">Salvar</button>
      </div></div>`).join('')}`:''}
    <div class="slabel">Sessão</div>
    <div class="seti">
      <div><div class="sl2">Sair</div><div class="ss">Voltar ao login</div></div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>`;
}
async function changePw(uid) {
  const pw=document.getElementById('npw-'+uid)?.value?.trim();
  if(!pw||pw.length<4){toast('Mínimo 4 caracteres','err');return;}
  await setPw(uid,pw);
  document.getElementById('npw-'+uid).value='';
  toast('Senha alterada!');
}
function logout() {
  curUser=null;
  closeSheet('s-cfg');
  document.getElementById('app').classList.remove('on');
  document.getElementById('login').classList.remove('off');
  selUid='admin';
  renderUsers();
}

// ── INIT ─────────────────────────────────────────────────
renderUsers();
</script>
